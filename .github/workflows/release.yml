name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build DMG
        run: ./gradlew :composeApp:packageDmg -Porg.gradle.java.home=$JAVA_HOME

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: composeApp/build/compose/binaries/main/dmg/Focus-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build MSI
        run: .\gradlew.bat :composeApp:packageMsi "-Porg.gradle.java.home=$env:JAVA_HOME"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp\build\compose\binaries\main\msi\Focus-*.msi

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
